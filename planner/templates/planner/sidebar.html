<button onclick="toggleSidebar()"
class="fixed left-4 top-4 z-[1000] rounded-2xl border border-white/10 bg-[#140c25]/95 px-3 py-2 text-white shadow-panel backdrop-blur md:hidden">
  <i class="ri-menu-line text-xl"></i>
</button>

<div id="sidebar"
class="fixed left-0 top-0 z-40 flex h-screen w-80 -translate-x-full flex-col border-r border-white/10 bg-[linear-gradient(180deg,rgba(20,13,36,0.96),rgba(10,6,18,0.98))] shadow-soft backdrop-blur-2xl transition-transform duration-300 md:static md:translate-x-0">

  <div class="border-b border-white/10 px-6 py-5">
    <div class="mb-4 flex items-start justify-between gap-3">
      <div>
        <p class="section-label">Travel Planner</p>
        <h2 class="mt-2 text-2xl font-extrabold tracking-[-0.03em] text-white"><i>Find Hidden Gems near you...</i></h2>
      </div>
      <!-- <a href="{% url 'logout' %}" class="secondary-button rounded-2xl px-3 py-2 text-xs font-semibold transition">
        Logout
      </a> -->
    </div>
    <p class="muted-copy text-sm leading-6">
      Search places, collect stops, and draw a route directly on the map.
    </p>
  </div>

  <div class="flex-1 overflow-y-auto px-5 py-5">
    <div class="mb-6 border-b border-white/10 pb-6">
      <p class="mb-4 text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">Explore categories</p>
      <div class="grid grid-cols-2 gap-3">
        <button class="catBtn rounded-2xl border border-white/10 bg-white/5 px-3 py-3 text-sm font-semibold text-white transition hover:border-[#c4b5fd]/30 hover:bg-white/10"
        onclick="loadCategory('type','tourist_attraction',this)">Attractions</button>
        <button class="catBtn rounded-2xl border border-white/10 bg-white/5 px-3 py-3 text-sm font-semibold text-white transition hover:border-[#c4b5fd]/30 hover:bg-white/10"
        onclick="loadCategory('type','restaurant',this)">Dining</button>
        <button class="catBtn rounded-2xl border border-white/10 bg-white/5 px-3 py-3 text-sm font-semibold text-white transition hover:border-[#c4b5fd]/30 hover:bg-white/10"
        onclick="loadCategory('type','hindu_temple',this)">Heritage</button>
        <button class="catBtn rounded-2xl border border-white/10 bg-white/5 px-3 py-3 text-sm font-semibold text-white transition hover:border-[#c4b5fd]/30 hover:bg-white/10"
        onclick="loadCategory('type','park',this)">Nature</button>
        <button class="catBtn rounded-2xl border border-white/10 bg-white/5 px-3 py-3 text-sm font-semibold text-white transition hover:border-[#c4b5fd]/30 hover:bg-white/10"
        onclick="loadCategory('keyword','shopping mall',this)">Shopping</button>
        <button class="catBtn rounded-2xl border border-white/10 bg-white/5 px-3 py-3 text-sm font-semibold text-white transition hover:border-[#c4b5fd]/30 hover:bg-white/10"
        onclick="loadCategory('keyword','adventure activities',this)">Adventure</button>
        <button class="catBtn rounded-2xl border border-white/10 bg-white/5 px-3 py-3 text-sm font-semibold text-white transition hover:border-[#c4b5fd]/30 hover:bg-white/10"
        onclick="loadCategory('keyword','cafe',this)">Cafes</button>
        <button class="catBtn rounded-2xl border border-white/10 bg-white/5 px-3 py-3 text-sm font-semibold text-white transition hover:border-[#c4b5fd]/30 hover:bg-white/10"
        onclick="loadCategory('keyword','museum',this)">Museums</button>
        <button class="catBtn rounded-2xl border border-white/10 bg-white/5 px-3 py-3 text-sm font-semibold text-white transition hover:border-[#c4b5fd]/30 hover:bg-white/10"
        onclick="loadCategory('keyword','hotel',this)">Hotels</button>
        <button class="catBtn rounded-2xl border border-white/10 bg-white/5 px-3 py-3 text-sm font-semibold text-white transition hover:border-[#c4b5fd]/30 hover:bg-white/10"
        onclick="loadCategory('keyword','nightlife',this)">Nightlife</button>
      </div>
      <div class="mt-5 rounded-3xl border border-white/10 bg-white/5 px-4 py-4 backdrop-blur-xl">
        <div class="mb-3 flex items-center justify-between gap-3">
          <p class="text-[11px] font-semibold uppercase tracking-[0.24em] text-slate-400">Set the distance </p>
          <span id="radiusValue" class="rounded-full bg-[#7c5cff]/15 px-3 py-1 text-xs font-semibold text-[#d8ccff]">5 km</span>
        </div>
        <input
          id="radiusSlider"
          type="range"
          min="1"
          max="25"
          value="5"
          step="1"
          class="h-2 w-full cursor-pointer appearance-none rounded-full bg-white/10 accent-[#8b5cf6]"
        />
        <div class="mt-3 flex items-center justify-between text-[11px] font-semibold text-slate-500">
          <span>1 km</span>
          <span>10 km</span>
          <span>25 km</span>
        </div>
      </div>
    </div>

    <div id="placesSection" class="hidden mb-8">
      <div class="mb-4 flex items-center justify-between gap-3">
        <p class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">Found places</p>
        <span id="placeCount" class="rounded-full bg-white/8 px-3 py-1 text-xs font-semibold text-[#c8b4ff]">0</span>
      </div>
      <div id="placesList" class="flex flex-col gap-3"></div>
    </div>

    <div>
      <div class="mb-4 flex items-center justify-between gap-3">
        <p class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">My itinerary</p>
        <span id="tripCount" class="rounded-full bg-white/8 px-3 py-1 text-xs font-semibold text-[#e3d7ff]">0 stops</span>
      </div>

      <div id="tripEmpty" class="rounded-3xl border border-dashed border-white/12 bg-white/5 px-4 py-8 text-center backdrop-blur-xl">
        <p class="text-lg font-bold tracking-[-0.03em] text-white">No stops selected yet</p>
        <p class="muted-copy mt-2 text-sm leading-6">Add places from search results to start building a route.</p>
      </div>

      <div id="tripList" class="mt-4 flex flex-col gap-3"></div>

      <button id="routeBtn" onclick="drawRoute()"
      class="primary-button hidden mt-5 w-full rounded-2xl px-4 py-4 text-sm font-semibold transition">
        Build route map
      </button>
    </div>
  </div>
</div>
