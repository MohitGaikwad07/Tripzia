{% extends "base.html" %}

{% block title %}Edit User | Admin{% endblock %}

{% block content %}
<div class="min-h-screen contour-bg noise-overlay px-4 py-8 md:px-8 md:py-10">
  <div class="mx-auto max-w-3xl">
    <section class="app-panel rounded-[2rem] p-6 md:p-8">
      <div class="mb-8">
        <p class="section-label">Admin User Edit</p>
        <h1 class="hero-title mt-3 text-4xl font-extrabold md:text-5xl">Update user details</h1>
      </div>

      <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-200">Username</label>
          <input type="text" name="username" value="{{ managed_user.username }}" required class="field-shell w-full rounded-2xl px-4 py-4 text-base outline-none transition">
        </div>
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-200">Email</label>
          <input type="email" name="email" value="{{ managed_user.email }}" class="field-shell w-full rounded-2xl px-4 py-4 text-base outline-none transition">
        </div>
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-200">New password</label>
          <input type="password" name="password" placeholder="Leave blank to keep current password" class="field-shell w-full rounded-2xl px-4 py-4 text-base outline-none transition">
        </div>
        <label class="flex items-center gap-3 rounded-2xl border border-white/10 bg-white/5 px-4 py-4 text-sm text-slate-200">
          <input type="checkbox" name="is_staff" {% if managed_user.is_staff %}checked{% endif %} class="h-4 w-4 rounded border-white/20 bg-transparent text-[#7c5cff]">
          Keep this user as admin
        </label>
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <a href="{% url 'admin_dashboard' %}" class="text-sm font-semibold text-[#c8b4ff] hover:text-white">Back to admin dashboard</a>
          <button type="submit" class="primary-button rounded-2xl px-8 py-4 text-base font-semibold transition">
            Save user
          </button>
        </div>
      </form>
    </section>
  </div>
</div>
{% endblock %}
